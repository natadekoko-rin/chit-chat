name: Build, Test & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run type check
        run: npm run build -- --mode test
        continue-on-error: true

      - name: Build project
        run: npm run build

      - name: Deploy to Firebase Hosting
        id: deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}'
          channelId: live
          projectId: chitchut-2b9e2

      - name: Display Live URL
        run: |
          echo "✅ Deployment Successful!"
          echo "🌐 Live URL: https://chitchut-2b9e2.web.app"
          echo "📊 Alternative: https://chitchut-2b9e2.firebaseapp.com"
          echo "Deployment Output:"
          echo "${{ steps.deploy.outputs.urls }}"

      - name: Create deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? 'success' : 'failure'
            console.log(`✅ Deployment ${status}`)
            console.log('🌐 Live URL: https://chitchut-2b9e2.web.app')

      - name: Comment on PR (if from PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **Firebase Deployment Complete!**\n\nPreview your changes before merging.'
            })
